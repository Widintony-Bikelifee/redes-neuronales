<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Clasificador de Correos IA</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">


</head>
<body>

<div class="container">

<h2>Clasificador de Correos</h2>

<input id="texto" placeholder="Escribe asunto del correo">

<button onclick="clasificar()">Clasificar</button>

<div class="resultado" id="resultado"></div>

</div>

<script>

function clasificar(){

const texto = document.getElementById("texto").value;

fetch("/clasificar",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({texto})
})
.then(r=>r.json())
.then(data=>{
document.getElementById("resultado").innerHTML =
"Clasificación: " + data.categoria
})

}

</script>

</body>
</html>
